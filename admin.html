<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - استقبال البث</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #222; color: white; }
        #remote-video-container { width: 500px; height: 375px; border: 2px dashed #007bff; margin: 20px auto; background: #000; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>لوحة الإدارة - مراقبة بث العميل</h2>
    <button id="listen-btn">فتح نظام الاستقبال</button>
    <div id="remote-video-container"></div>

    <script>
        // ضع هنا نفس الـ App ID الخاص بك
        const APP_ID = "d99a16c4967f47c4962d1d4e721587bb"; 
        const CHANNEL = "admin_channel"; 

        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

        document.getElementById('listen-btn').onclick = async () => {
            await client.join(APP_ID, CHANNEL, null, null);
            alert("تم تفعيل نظام الاستقبال.. بانتظار بث العميل");
        };

        // عندما يقوم العميل بالنشر، تستقبله الإدارة هنا فوراً
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            
            if (mediaType === "video") {
                // تشغيل فيديو العميل في حاوية الإدارة
                user.videoTrack.play("remote-video-container");
            }
            if (mediaType === "audio") {
                // تشغيل صوت العميل
                user.audioTrack.play();
            }
        });
    </script>
</body>
</html>
